name: Build Debian packages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-debs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dist: [bookworm, trixie]
        arch: ["32", "64"]

    steps:
      - name: Free up runner disk space
        shell: bash
        run: |
          set -euo pipefail
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/.ghcup /usr/local/share/boost /opt/hostedtoolcache/CodeQL || true
          df -h /
      - name: Checkout project (full history + submodules)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Fetch submodule tags (dbs derives the version from them)
        shell: bash
        run: |
          set -euo pipefail
          git submodule foreach --recursive 'git fetch --tags --force origin || true'
      - name: Install GitPython (host changelog generator dependency)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-git
      - name: Checkout dbs tool
        uses: actions/checkout@v6
        with:
          repository: DroneProUkr/DBS
          path: .dbs
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute lowercase GHCR image ref
        id: img
        shell: bash
        run: echo "ref=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Build .deb with dbs
        shell: bash
        env:
          BUILDX_BUILDER: ${{ steps.buildx.outputs.name }}
          CACHE_REF: ${{ steps.img.outputs.ref }}:buildcache-${{ matrix.dist }}-${{ matrix.arch }}
          DBS_HOME: ${{ runner.temp }}/dbs
        run: |
          set -euo pipefail
          mkdir -p "$DBS_HOME/droneprorepo"
          git -C "$DBS_HOME/droneprorepo" init -q
          bash ./.dbs/dbs . --dist "${{ matrix.dist }}" --arch "${{ matrix.arch }}" -- \
            --provenance=false --sbom=false \
            --load \
            --cache-from "type=registry,ref=${CACHE_REF}" \
            --cache-to   "type=registry,ref=${CACHE_REF},mode=max,image-manifest=true,oci-mediatypes=true"
      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v7
        with:
          name: debs-${{ matrix.dist }}-${{ matrix.arch }}
          path: out/${{ matrix.dist }}/*/*.deb
          if-no-files-found: error

  release:
    needs: build
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout project (full history + submodules)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Fetch submodule tags (dbs derives the version from them)
        shell: bash
        run: |
          set -euo pipefail
          git submodule foreach --recursive 'git fetch --tags --force origin || true'
      - name: Install GitPython (host changelog generator dependency)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-git
      - name: Checkout dbs tool
        uses: actions/checkout@v6
        with:
          repository: DroneProUkr/DBS
          path: .dbs
      - name: Generate changelog, extract version and release notes
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          python3 ./.dbs/dbs-changelog . > changelog
          version="$(sed -n '1s/^[^(]*(\([^)]*\)).*/\1/p' changelog)"
          [ -n "$version" ] || { echo "::error::could not parse version from generated changelog"; exit 1; }
          awk 'NR==1{next} /^ -- /{exit} NF{seen=1} seen{print}' changelog > RELEASE_NOTES.md
          case "$version" in *+*|*~*) prerelease=true ;; *) prerelease=false ;; esac
          tag="v$(printf '%s' "$version" | tr '~' '-')"
          git check-ref-format "refs/tags/$tag" || { echo "::error::computed tag '$tag' is not a valid git ref"; exit 1; }
          {
            echo "version=$version"
            echo "tag=$tag"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"
          echo "Release $tag (version=$version, prerelease=$prerelease)"
          cat RELEASE_NOTES.md
      - name: Download all built .deb artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: debs-*
          path: dist
      - name: Collect release assets
        shell: bash
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p release
          find dist -name '*.deb' -print0 | sort -z | while IFS= read -r -d '' f; do
            art="${f#dist/}"; art="${art%%/*}"   # debs-<suite>-<arch>
            cell="${art#debs-}"; suite="${cell%-*}"
            dest="release/${suite}-$(basename "$f")"
            [ -e "$dest" ] || cp "$f" "$dest"
          done
          ls -l release
          ls release/*.deb >/dev/null 2>&1 || { echo "::error::no .deb assets collected"; exit 1; }
          if ls release/*.deb | grep -vF "_${VERSION}_" >&2; then
            echo "::error::collected .deb above do not match release version ${VERSION}"; exit 1
          fi
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          body_path: RELEASE_NOTES.md
          prerelease: ${{ steps.meta.outputs.prerelease }}
          files: release/*.deb
          fail_on_unmatched_files: true
